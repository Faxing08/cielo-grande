<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mesas - FactuEco</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css"
    />
  </head>
  <body class="bg-body">
    <header class="sticky-top">
      <nav
        class="shadow-sm bg-body-tertiary border-bottom navbar navbar-expand px-3"
      >
        <button class="btn btn-outline-secondary">
          <i class="bi bi-search"></i>
          <span>Buscar</span>
        </button>

        <div class="ms-auto d-flex gap-2">
          <button class="btn btn-outline-secondary">
            <span>John</span>
            <i class="bi bi-person-circle ms-1"></i>
          </button>

          <button class="btn btn-outline-secondary" id="theme-toggle">
            <i class="bi bi-moon"></i>
          </button>
        </div>
      </nav>
      <nav
        class="tabbed nav nav-pills nav-fill mb-3 bg-body-secondary shadow-sm rounded m-3"
      >
        <a class="nav-link active" href="javascript:void(0)">
          <i class="bi bi-house"></i>
          <span>Salón</span>
        </a>

        <a class="nav-link" href="javascript:void(0)">
          <i class="bi bi-cup-hot"></i>
          <span>Barra</span>
        </a>

        <a class="nav-link" href="javascript:void(0)">
          <i class="bi bi-shop"></i>
          <span>Granja</span>
        </a>
      </nav>
    </header>

    <div class="container-fluid mt-3">
      <div class="page padding active" id="salonView">
        <div class="row g-3 tables-container"></div>
      </div>

      <div class="page padding d-none" id="barraView">
        <div class="row g-3 tables-container"></div>
      </div>

      <div class="page padding d-none" id="granjaView">
        <div class="row g-3 tables-container"></div>
      </div>
    </div>
    <script src="../../utils/theme.js"></script>
    <script src="../../controllers/tables.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
