<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - FactuEco</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link rel="stylesheet" href="/src/views/styles.css" />
  <link rel="shortcut icon" href="/src/views/img/Cielo_Grande_Eco_sin_fondo.png" type="image/png">


</head>
<!-- body -->
<body class="bg-success-subtle min-vh-100 d-flex flex-column align-items-center justify-content-center px-3">
  <!-- Logo -->
  <img src="/src/views/img/Cielo_Grande_Eco_sin_fondo.png" alt="Logo de FactuEco" class="mb-3 img-fluid"
    style="max-width: 260px" />
<!-- titulo y subtitulo -->
  <h1 class="text-center fw-bold">FactuEco</h1>
  <h2 class="text-center fw-semibold mt-2 fs-5">Bienvenidos</h2>
<!-- carta del login -->
  <div class="card-login w-100 bg-success bg-opacity-25 p-4 rounded shadow mt-4 d-flex flex-column align-items-center"
    style="max-width: 400px">
<!-- formulario de login -->
    <form id="loginForm" class="w-100">
      <div id="mensaje"></div>
<!-- campos del formulario -->
      <div class="d-flex align-items-center w-100 bg-white border rounded px-3 py-2 mb-3">
<!-- icono de correo -->
        <img src="/src/views/img/gmail.png" alt="gmail icon" width="20" height="20" class="me-2" />
<!-- campo de correo -->
        <input type="email" placeholder="Correo electrónico" id="email" class="form-control border-0 shadow-none" />
      </div>

      <div class="d-flex align-items-center w-100 bg-white border rounded px-3 py-2 mb-3">
<!-- icono de contraseña -->
        <img src="/src/views/img/contraseña.png" alt="password icon" width="20" height="20" class="me-2" />
<!-- campo de contraseña -->
        <input type="password" placeholder="Contraseña" id="password" class="form-control border-0 shadow-none" />
      </div>
<!-- enlace de ayuda -->
      <a href="/src/views/help/ayuda.html" class="small text-secondary mb-3 link-primary">
        Ayuda
      </a>
<!-- botón de inicio de sesión -->
      <button class="btn btn-success w-100">Iniciar Sesión</button>
    </form>
  </div>








  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="/src/controllers/login.js"></script>
</body>

</html>
